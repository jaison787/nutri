<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri AI - Food Detection Tester</title>
    <style>
        :root {
            --primary: #4ade80;
            --primary-dark: #22c55e;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.25rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #4ade80, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        #upload-box {
            border: 2px dashed #475569;
            padding: 3rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
            position: relative;
        }

        #upload-box:hover {
            border-color: var(--primary);
            background: rgba(74, 222, 128, 0.05);
        }

        #preview {
            max-width: 100%;
            border-radius: 0.75rem;
            margin-top: 1rem;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        button {
            background-color: var(--primary);
            color: #064e3b;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            width: 100%;
            font-size: 1.1rem;
        }

        button:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #334155;
            cursor: not-allowed;
            color: #94a3b8;
        }

        #result {
            margin-top: 2rem;
            text-align: left;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .food-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .meta-tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .tag-cnn {
            background: #3b82f6;
            color: white;
        }

        .tag-gemini {
            background: #8b5cf6;
            color: white;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 0.75rem;
            border-radius: 0.5rem;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--primary);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            margin: 1rem 0;
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Nutri AI Tester</h1>
        <p>Hybrid Detection: Food-101 CNN + Gemini Vision</p>

        <div id="upload-box" onclick="document.getElementById('file-input').click()">
            <span id="upload-txt">Click to select a food image</span>
            <input type="file" id="file-input" hidden accept="image/*" onchange="previewImage(this)">
            <img id="preview" alt="Preview">
        </div>

        <button id="analyze-btn" onclick="uploadAndAnalyze()" disabled>Analyze Food</button>

        <div class="loading" id="loader">
            <div class="spinner"></div>
            <p>AI is analyzing...</p>
        </div>

        <div id="result">
            <div class="food-card">
                <div id="source-tag" class="meta-tag">Source: AI</div>
                <h2 id="food-name" style="margin: 0; color: white;">Food Name</h2>
                <p id="confidence-score" style="margin: 0.25rem 0 1rem; color: #94a3b8; font-size: 0.9rem;">Confidence:
                    0.00</p>

                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="stat-label">Calories</div>
                        <div id="calories" class="stat-value">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Protein</div>
                        <div id="protein" class="stat-value">0g</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Carbs</div>
                        <div id="carbs" class="stat-value">0g</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Fat</div>
                        <div id="fat" class="stat-value">0g</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use standard localhost port for your backend
        const API_URL = "http://127.0.0.1:8000/analyze";

        function previewImage(input) {
            const preview = document.getElementById('preview');
            const txt = document.getElementById('upload-txt');
            const btn = document.getElementById('analyze-btn');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    txt.style.display = 'none';
                    btn.disabled = false;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function uploadAndAnalyze() {
            const input = document.getElementById('file-input');
            const btn = document.getElementById('analyze-btn');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');

            if (!input.files[0]) return;

            // UI State
            btn.disabled = true;
            loader.style.display = 'block';
            resultDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('image', input.files[0]);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('API Error');

                const data = await response.json();
                displayResults(data);
            } catch (err) {
                alert('Connection Error: Make sure backend is running on port 8003\nuvicorn main:app --reload --port 8003');
                console.error(err);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        function displayResults(data) {
            const resultDiv = document.getElementById('result');
            const food = data.foods[0];

            document.getElementById('food-name').innerText = food.name;
            document.getElementById('calories').innerText = food.calories;
            document.getElementById('protein').innerText = food.protein;
            document.getElementById('carbs').innerText = food.carbs;
            document.getElementById('fat').innerText = food.fat;

            // source metadata
            const sourceTag = document.getElementById('source-tag');
            sourceTag.innerText = `Source: ${data.source || 'AI'}`;
            sourceTag.className = (data.source && data.source.includes('CNN')) ? 'meta-tag tag-cnn' : 'meta-tag tag-gemini';

            document.getElementById('confidence-score').innerText = `Model Confidence: ${(data.confidence * 100).toFixed(1)}%`;

            resultDiv.style.display = 'block';
        }
    </script>
</body>

</html>
